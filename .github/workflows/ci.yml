name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Benchmark Regression Gate
        run: pnpm bench:ci

      - name: Upload Benchmark Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmarks/last-ci-report.json
          if-no-files-found: ignore

      - name: Build
        run: pnpm build

      - name: Bundle Size Gate
        run: pnpm bundle:size

  product-matrix:
    name: ${{ matrix.surface }} gate
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - surface: core
            command: pnpm coverage:core
            needsChrome: false
          - surface: share
            command: pnpm --filter @webblackbox/share-server e2e:share
            needsChrome: false
          - surface: player
            command: pnpm --filter @webblackbox/player e2e:playback
            needsChrome: true
          - surface: player-pressure
            command: pnpm --filter @webblackbox/player-sdk test:pressure
            needsChrome: false
          - surface: lite
            command: pnpm --filter @webblackbox/extension e2e:realworld:ci
            needsChrome: true
          - surface: lite-perf
            command: pnpm --filter @webblackbox/extension e2e:perf:lite:ci
            needsChrome: true
          - surface: full
            command: pnpm --filter @webblackbox/extension e2e:fullchain:full
            needsChrome: true
          - surface: full-memory
            command: pnpm --filter @webblackbox/extension e2e:memory:full:ci
            needsChrome: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Chrome for Testing
        if: ${{ matrix.needsChrome }}
        timeout-minutes: 5
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Product surface gate (${{ matrix.surface }})
        env:
          WB_E2E_CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          WB_E2E_HEADLESS: "1"
          WB_E2E_USE_POPUP_UI: "0"
        run: ${{ matrix.command }}
