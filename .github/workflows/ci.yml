name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage (Core Packages)
        run: pnpm coverage:core

      - name: Benchmark Regression Gate
        run: pnpm bench:ci

      - name: Upload Benchmark Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmarks/last-ci-report.json
          if-no-files-found: ignore

      - name: Build
        run: pnpm build

      - name: Bundle Size Gate
        run: pnpm bundle:size

      - name: Setup Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E Fullchain (Record -> Export -> Replay)
        env:
          WB_E2E_HEADLESS: "0"
          WB_E2E_USE_POPUP_UI: "0"
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm --filter @webblackbox/extension e2e:fullchain:lite
